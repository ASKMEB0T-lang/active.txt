<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Human Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
    <style>
        body {
            background: #000;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: system-ui, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            background: #000;
            border: 2px solid #D4AF37;
            border-radius: 28px;
            padding: 32px 24px;
            max-width: 400px;
            text-align: center;
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.3);
        }
        h1 {
            color: #D4AF37;
            font-size: 28px;
            margin-bottom: 8px;
        }
        .sub {
            color: #D4AF37;
            opacity: 0.8;
            margin-bottom: 24px;
        }
        .h-captcha {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        .status {
            margin-top: 20px;
            font-size: 14px;
            color: #D4AF37;
            background: rgba(212, 175, 55, 0.1);
            padding: 8px;
            border-radius: 40px;
            display: none;
        }
        .footer {
            margin-top: 24px;
            font-size: 11px;
            color: #D4AF37;
            opacity: 0.6;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ VERIFY</h1>
        <div class="sub">Complete the captcha</div>
        <div class="h-captcha" data-sitekey="a1b657c2-2bde-4a40-80d0-4ee29d8e303a"></div>
        <div id="status" class="status"></div>
        <div class="footer">◆ hCaptcha ◆</div>
    </div>
    <script>
        const WebApp = window.Telegram.WebApp;
        WebApp.ready();
        WebApp.expand();
        
        let solved = false;
        const statusDiv = document.getElementById('status');
        
        window.onCaptchaSolved = function(token) {
            if (solved) return;
            solved = true;
            statusDiv.style.display = 'block';
            statusDiv.innerText = '✓ Verified! Returning to bot...';
            // إرسال البيانات إلى البوت
            WebApp.sendData(JSON.stringify({
                action: 'captcha_solved',
                token: token
            }));
            // إغلاق النافذة بعد نصف ثانية
            setTimeout(() => WebApp.close(), 500);
        };
        
        window.onCaptchaExpired = function() {
            statusDiv.style.display = 'block';
            statusDiv.innerText = '❌ Captcha expired. Refresh page.';
            solved = false;
        };
        
        // إجبار الخلفية السوداء
        WebApp.onEvent('themeChanged', function() {
            document.body.style.backgroundColor = "#000000";
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Human Verification</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: var(--tg-theme-bg-color, #ffffff);
            color: var(--tg-theme-text-color, #000000);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .logo { font-size: 64px; margin-bottom: 20px; }
        h1 { font-size: 24px; margin-bottom: 10px; }
        p { color: var(--tg-theme-hint-color, #666666); margin-bottom: 30px; font-size: 14px; }
        .h-captcha { display: flex; justify-content: center; margin-bottom: 20px; }
        .status {
            margin-top: 20px;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
            display: none;
        }
        .status.success { background: #d4edda; color: #155724; display: block; }
        .status.error { background: #f8d7da; color: #721c24; display: block; }
        .status.loading { background: #e2e3e5; color: #383d41; display: block; }
        button {
            background: var(--tg-theme-button-color, #2481cc);
            color: var(--tg-theme-button-text-color, #ffffff);
            border: none;
            padding: 12px 24px;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            width: 100%;
            cursor: pointer;
            margin-top: 20px;
        }
        button:disabled { opacity: 0.6; cursor: not-allowed; }
        .footer { margin-top: 30px; font-size: 12px; color: var(--tg-theme-hint-color, #999999); }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🛡️</div>
        <h1>Verify You Are Human</h1>
        <p>Please complete the verification below to continue using the bot.</p>
        
        <div class="h-captcha" data-sitekey="a1b657c2-2bde-4a40-80d0-4ee29d8e303a"></div>
        
        <button id="verifyBtn" disabled>🔒 Complete Captcha First</button>
        
        <div id="status" class="status"></div>
        <div class="footer">Powered by hCaptcha | Security check</div>
    </div>

    <script>
        const WebApp = window.Telegram.WebApp;
        WebApp.ready();
        WebApp.expand();
        
        let captchaToken = null;
        const verifyBtn = document.getElementById('verifyBtn');
        const statusDiv = document.getElementById('status');
        
        window.onCaptchaSolved = function(token) {
            captchaToken = token;
            verifyBtn.disabled = false;
            verifyBtn.innerHTML = '✅ Verify & Continue';
        };
        
        window.onCaptchaExpired = function() {
            captchaToken = null;
            verifyBtn.disabled = true;
            verifyBtn.innerHTML = '🔒 Captcha Expired - Try Again';
        };
        
        verifyBtn.addEventListener('click', function() {
            if (!captchaToken) {
                showStatus('error', 'Please complete the captcha first');
                return;
            }
            
            verifyBtn.disabled = true;
            verifyBtn.innerHTML = '⏳ Verifying...';
            showStatus('loading', 'Verifying your response...');
            
            WebApp.sendData(JSON.stringify({
                action: 'captcha_solved',
                token: captchaToken
            }));
            
            setTimeout(() => WebApp.close(), 500);
        });
        
        function showStatus(type, message) {
            statusDiv.className = 'status ' + type;
            statusDiv.innerHTML = message;
        }
        
        WebApp.onEvent('themeChanged', function() {
            document.body.style.backgroundColor = WebApp.themeParams.bg_color;
            document.body.style.color = WebApp.themeParams.text_color;
        });
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Verify Humanity</title>
    <!-- Telegram WebApp SDK (ضروري) -->
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <!-- hCaptcha -->
    <script src="https://js.hcaptcha.com/1/api.js" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #000000;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            max-width: 460px;
            width: 100%;
            text-align: center;
            background: #000000;
            border: 2px solid #D4AF37;
            border-radius: 32px;
            padding: 32px 24px;
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.3);
        }
        h1 {
            color: #D4AF37;
            font-size: 28px;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }
        .sub {
            color: #D4AF37;
            opacity: 0.8;
            font-size: 14px;
            margin-bottom: 28px;
            border-left: 2px solid #D4AF37;
            padding-left: 12px;
            display: inline-block;
        }
        .h-captcha {
            display: flex;
            justify-content: center;
            margin: 20px 0;
        }
        .h-captcha iframe {
            border-radius: 16px;
            box-shadow: 0 0 0 1px #D4AF37;
        }
        .footer {
            margin-top: 28px;
            font-size: 11px;
            color: #D4AF37;
            opacity: 0.6;
            border-top: 1px solid rgba(212, 175, 55, 0.3);
            padding-top: 16px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🛡️ VERIFY</h1>
        <div class="sub">Complete the captcha to continue</div>
        <div class="h-captcha"
             data-sitekey="a1b657c2-2bde-4a40-80d0-4ee29d8e303a"
             data-callback="captchaSolved"
             data-expired-callback="captchaExpired">
        </div>
        <div class="footer">◆ Powered by hCaptcha ◆</div>
    </div>

    <script>
        // تهيئة Telegram WebApp
        const tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();  // تمديد الصفحة لملء الشاشة

        // هذه الدالة تُستدعى تلقائياً بعد حل الكابتشا بنجاح
        window.captchaSolved = function(token) {
            console.log("Captcha solved, token:", token);
            // إنشاء البيانات التي ينتظرها البوت
            const payload = {
                action: "captcha_solved",
                token: token
            };
            // إرسال البيانات إلى البوت
            tg.sendData(JSON.stringify(payload));
            // إغلاق النافذة بعد نصف ثانية لضمان الإرسال
            setTimeout(() => {
                tg.close();
            }, 500);
        };

        // في حال انتهاء صلاحية الكابتشا (اختياري)
        window.captchaExpired = function() {
            console.log("Captcha expired");
            // يمكن إعادة تعيين الحالة هنا إذا أردت
        };
    </script>
</body>
</html>
